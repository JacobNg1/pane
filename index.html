<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简天气预报</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); text-align: center; min-width: 280px; }
        h1 { margin-top: 0; color: #1f2937; }
        .temp { font-size: 3.5rem; font-weight: bold; color: #3b82f6; margin: 1rem 0; }
        .info { color: #4b5563; font-size: 1.1rem; }
        .loading { color: #9ca3af; }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="city">正在定位...</h1>
        <div id="weather-box" class="loading">正在获取天气数据...</div>
    </div>

    <script>
        async function getWeather() {
            try {
                // 使用 Open-Meteo API（免费、无需 Key、支持 CORS）
                const res = await fetch('https://api.open-meteo.com/v1/forecast?latitude=39.9042&longitude=116.4074&current_weather=true&timezone=Asia/Shanghai');
                const data = await res.json();

                const cw = data.current_weather;
                const temp = cw.temperature;
                const windSpeed = cw.windspeed;
                const windDir = cw.winddirection;

                document.getElementById('city').innerText = '北京';
                document.getElementById('weather-box').innerHTML = `
                    <div class="temp">${temp}°C</div>
                    <div class="info">风速：${windSpeed} km/h | 风向：${windDir}°</div>
                `;
            } catch (error) {
                document.getElementById('weather-box').innerText = '天气获取失败，请重试';
                console.error(error);
            }
        }

        getWeather();
    </script>
</body>
</html>
