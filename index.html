<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简天气预报</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); text-align: center; min-width: 280px; }
        h1 { margin-top: 0; color: #1f2937; }
        .temp { font-size: 3.5rem; font-weight: bold; color: #3b82f6; margin: 1rem 0; }
        .info { color: #4b5563; font-size: 1.1rem; }
        .loading { color: #9ca3af; }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="city">正在定位...</h1>
        <div id="weather-box" class="loading">正在获取天气数据...</div>
    </div>

    <script>
        async function getWeather() {
            try {
                // 使用开源免 Key 的 wttr.in 接口，直接请求 JSON 格式数据
                const res = await fetch('https://wttr.in/?format=j1');
                const data = await res.json();
                
                // 解析返回的数据
                const current = data.current_condition[0];
                const area = data.nearest_area[0];
                
                // 获取城市名（优先显示本地化名字，没有就显示英文名）
                const cityName = area.localNames ? area.localNames[0].value : area.areaName[0].value;
                document.getElementById('city').innerText = cityName;

                // 获取温度和天气描述（自动翻译/转换为易读格式）
                const temp = current.temp_C;
                const weatherDesc = current.lang_zh ? current.lang_zh[0].value : current.weatherDesc[0].value;
                const windDir = current.winddir16Point;

                document.getElementById('weather-box').innerHTML = `
                    <div class="temp">${temp}°C</div>
                    <div class="info">${weatherDesc} | 风向：${windDir}</div>
                `;
            } catch (error) {
                document.getElementById('weather-box').innerText = '天气获取失败，请重试';
                console.error(error);
            }
        }

        getWeather();
    </script>
</body>
</html>
