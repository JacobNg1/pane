<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简天气预报</title>
    <style>
        body { font-family: system-ui, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); text-align: center; min-width: 280px; }
        h1 { margin-top: 0; color: #1f2937; }
        .temp { font-size: 3.5rem; font-weight: bold; color: #3b82f6; margin: 1rem 0; }
        .info { color: #4b5563; font-size: 1.1rem; }
        .loading { color: #9ca3af; }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="city">正在定位...</h1>
        <div id="weather-box" class="loading">正在获取天气数据...</div>
    </div>

    <script>
        // 使用高德地图高频免费 API（免 Key 演示，生产环境建议自己去高德/和风天气注册免费 Key）
        async function getWeather() {
            try {
                // 1. 根据用户 IP 自动定位城市
                const ipRes = await fetch('https://restapi.amap.com/v3/ip?key=b2ef87e795904ed2a20bde1ec1721b0f');
                const ipData = await ipRes.json();
                const adcode = ipData.adcode || '110000'; // 获取城市行政区号，默认北京
                const cityName = ipData.city || '北京市';

                document.getElementById('city').innerText = cityName;

                // 2. 根据区号查询实时天气
                const weatherRes = await fetch(`https://restapi.amap.com/v3/weather/weatherInfo?key=b2ef87e795904ed2a20bde1ec1721b0f&city=${adcode}`);
                const weatherData = await weatherRes.json();
                
                if (weatherData.lives && weatherData.lives.length > 0) {
                    const live = weatherData.lives[0];
                    document.getElementById('weather-box').innerHTML = `
                        <div class="temp">${live.temperature}°C</div>
                        <div class="info">${live.weather} | 风向：${live.winddirection}风</div>
                    `;
                } else {
                    throw new Error('天气数据为空');
                }
            } catch (error) {
                document.getElementById('weather-box').innerText = '天气获取失败，请刷新重试';
                console.error(error);
            }
        }

        getWeather();
    </script>
</body>
</html>
